<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOS | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d9ff00; --bg: #0a0a0a; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }
        .df { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        .bb { border: 2px solid #fff; }
        .sa { box-shadow: 4px 4px 0 0 var(--accent); }
        .nav-link { transition: all .2s; border-left: 4px solid transparent; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: rgba(217,255,0,.08); border-left-color: var(--accent); color: var(--accent); }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .view { display: none; } .view.active { display: block; }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 12px 20px; font-size: 11px; font-weight: 700; animation: slideIn .3s ease; border-radius: 0; }
        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .metric-card:hover { transform: translateY(-2px); }
        input, select, textarea { outline: none; color: #fff; background: transparent; }
        .btn-accent { background: var(--accent); color: #000; font-weight: 700; transition: all .15s; }
        .btn-accent:hover { opacity: .9; transform: translate(1px,1px); box-shadow: none; }
        table { border-collapse: collapse; width: 100%; }
        .tab-btn { transition: all .2s; }
        .tab-btn.active { background: var(--accent); color: #000; }
        .order-row:hover { background: rgba(255,255,255,.04); cursor: pointer; }
        .login-tab.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        .login-tab { border-bottom: 2px solid transparent; transition: all .2s; cursor: pointer; }
    </style>
</head>
<body>

<!-- ─── LOGIN SCREEN ──────────────────────────────────────── -->
<div id="loginScreen" class="h-screen flex items-center justify-center">
    <div class="w-[440px] p-10 bb bg-white/5 relative">
        <div class="absolute -top-4 -left-4 w-8 h-8 bg-[#d9ff00]"></div>
        <div class="absolute -bottom-4 -right-4 w-4 h-4 border-2 border-[#d9ff00]"></div>
        <h1 class="df text-3xl font-bold tracking-tighter mb-1"><span class="text-[#d9ff00]">FOOD</span>OS</h1>
        <p class="text-[10px] text-white/30 df tracking-widest mb-8">Online Food Management System</p>

        <!-- Role Tabs -->
        <div id="loginForm">
            <div class="flex gap-6 mb-6 border-b border-white/10">
                <button class="login-tab active pb-3 df text-[10px] tracking-widest" onclick="setLoginRole('customer',this)">Customer</button>
                <button class="login-tab pb-3 df text-[10px] tracking-widest text-white/40" onclick="setLoginRole('admin',this)">Admin</button>
            </div>
            <p id="loginHint" class="text-[10px] text-white/30 mb-4">Login with your email and password</p>
            <label class="text-[10px] df tracking-widest text-white/50 block mb-1" id="emailLabel">Email</label>
            <input id="loginEmail" class="w-full bg-white/5 border-2 border-white/10 px-4 py-3 text-sm mb-4 focus:border-[#d9ff00] transition-colors" placeholder="email@example.com">
            <label class="text-[10px] df tracking-widest text-white/50 block mb-1">Password</label>
            <input id="loginPassword" type="password" class="w-full bg-white/5 border-2 border-white/10 px-4 py-3 text-sm mb-6 focus:border-[#d9ff00] transition-colors" placeholder="Enter password...">
            <button onclick="doLogin()" class="w-full btn-accent df text-[10px] tracking-widest py-3 sa mb-4">Login</button>
            <button onclick="showRegister()" id="registerLink" class="text-[10px] df tracking-widest text-white/40 hover:text-[#d9ff00] transition-colors">→ New? Register Here</button>
        </div>

        <div id="registerForm" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 class="df text-xs tracking-widest font-bold">Create Account</h2>
                <button onclick="showLoginForm()" class="text-[10px] df tracking-widest text-white/40 hover:text-[#d9ff00]">← Back</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="text-[10px] df tracking-widest text-white/50 block mb-1">Full Name</label>
                    <input id="regName" class="w-full bg-white/5 border-2 border-white/10 px-3 py-2.5 text-sm focus:border-[#d9ff00] transition-colors" placeholder="Your name">
                </div>
                <div>
                    <label class="text-[10px] df tracking-widest text-white/50 block mb-1">Phone</label>
                    <input id="regPhone" class="w-full bg-white/5 border-2 border-white/10 px-3 py-2.5 text-sm focus:border-[#d9ff00] transition-colors" placeholder="9876543210">
                </div>
            </div>
            <label class="text-[10px] df tracking-widest text-white/50 block mb-1">Email</label>
            <input id="regEmail" class="w-full bg-white/5 border-2 border-white/10 px-4 py-2.5 text-sm mb-3 focus:border-[#d9ff00] transition-colors" placeholder="email@example.com">
            <label class="text-[10px] df tracking-widest text-white/50 block mb-1">Password</label>
            <input id="regPassword" type="password" class="w-full bg-white/5 border-2 border-white/10 px-4 py-2.5 text-sm mb-3 focus:border-[#d9ff00] transition-colors" placeholder="Password">
            <label class="text-[10px] df tracking-widest text-white/50 block mb-1">Address</label>
            <input id="regAddress" class="w-full bg-white/5 border-2 border-white/10 px-4 py-2.5 text-sm mb-5 focus:border-[#d9ff00] transition-colors" placeholder="Your address">
            <button onclick="doRegister()" class="w-full btn-accent df text-[10px] tracking-widest py-3 sa">Create Account</button>
        </div>
    </div>
</div>

<!-- ─── DASHBOARD ─────────────────────────────────────────── -->
<div id="dashboard" class="hidden h-screen relative overflow-hidden" style="display:none">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 bottom-0 w-64 border-r-2 border-white/10 flex flex-col z-30">
        <div class="p-6">
            <h1 class="df text-xl font-bold tracking-tighter"><span class="text-[#d9ff00]">FOOD</span>OS</h1>
            <p class="text-[9px] text-white/30 mt-1 df tracking-widest">Command Center</p>
        </div>
        <nav id="sidebarNav" class="flex-1 px-3 space-y-0.5 overflow-y-auto"></nav>
        <div class="p-4 border-t-2 border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bb rounded-full bg-[#d9ff00]/20 flex items-center justify-center df text-xs font-bold text-[#d9ff00]" id="userAvatar">?</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate" id="userName">User</p>
                    <p class="text-[9px] text-white/40 df" id="userRole">Role</p>
                </div>
                <button onclick="doLogout()" class="text-white/30 hover:text-[#d9ff00] transition-colors" title="Logout">
                    <iconify-icon icon="lucide:log-out" class="text-lg"></iconify-icon>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="ml-64 h-screen flex flex-col overflow-hidden">
        <header class="h-16 border-b-2 border-white/10 flex items-center justify-between px-8 shrink-0 bg-[#0a0a0a]/90 backdrop-blur-md sticky top-0 z-20">
            <h2 class="df text-base font-bold tracking-tight" id="pageTitle">Dashboard</h2>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-2 text-[9px] df tracking-widest text-white/30">
                    <span class="w-1.5 h-1.5 rounded-full bg-[#d9ff00] animate-pulse"></span>LIVE
                </span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-8" id="mainContent">

            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="view active">
                <div class="grid grid-cols-4 gap-5 mb-8" id="statsGrid"></div>
                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-8 bg-white/5 bb">
                        <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
                            <h4 class="df text-xs font-bold tracking-widest">Recent Orders</h4>
                            <button onclick="navigate('orders')" class="text-[10px] df tracking-widest text-[#d9ff00] hover:underline">View All →</button>
                        </div>
                        <div id="dashRecentOrders"></div>
                    </div>
                    <div class="col-span-4 space-y-3">
                        <h4 class="df text-xs font-bold tracking-widest mb-4">Quick Actions</h4>
                        <div id="quickActions" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- RESTAURANTS VIEW -->
            <div id="view-restaurants" class="view">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="df text-xs tracking-widest font-bold">Restaurants</h3>
                    <div class="flex items-center gap-3">
                        <input id="searchRestaurant" type="text" placeholder="Search by name or location..." class="bg-white/5 border-2 border-white/10 px-4 py-2 text-sm focus:border-[#d9ff00] transition-colors w-64" oninput="debounceSearchRestaurant()">
                        <button id="btnToggleArchiveRes" class="hidden bb bg-transparent text-white/50 df text-[9px] tracking-widest px-4 py-2.5 hover:text-white transition-colors" onclick="toggleArchiveRes()">Show Deleted</button>
                        <button id="btnAddRestaurant" class="hidden btn-accent df text-[9px] tracking-widest px-5 py-2.5 sa" onclick="showAddRestaurantModal()">+ Add Restaurant</button>
                    </div>
                </div>
                <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>

            <!-- MENU VIEW -->
            <div id="view-menu" class="view">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="df text-xs tracking-widest font-bold">Menu — <span id="menuResName" class="text-[#d9ff00]"></span></h3>
                    <div class="flex gap-3">
                        <button id="btnToggleMenuArchive" class="hidden bb bg-transparent text-white/50 df text-[9px] tracking-widest px-4 py-2 hover:text-white transition-colors" onclick="toggleArchiveMenu()">Show Deleted</button>
                        <button onclick="navigate('restaurants')" class="bb bg-transparent text-white df text-[9px] tracking-widest px-4 py-2 hover:bg-white hover:text-black transition-colors">← Back</button>
                        <button id="btnAddMenuItem" class="hidden btn-accent df text-[9px] tracking-widest px-4 py-2 sa" onclick="showAddMenuItemModal()">+ Add Item</button>
                    </div>
                </div>
                <div id="menuGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>

            <!-- CART VIEW -->
            <div id="view-cart" class="view">
                <h3 class="df text-xs tracking-widest font-bold mb-6">Your Cart</h3>
                <div id="cartContent"></div>
            </div>

            <!-- ORDERS VIEW -->
            <div id="view-orders" class="view">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="df text-xs tracking-widest font-bold">Order History</h3>
                    <div class="flex items-center gap-3">
                        <input id="searchOrder" type="text" placeholder="Search Order ID..." class="bg-white/5 border-2 border-white/10 px-4 py-2 text-sm focus:border-[#d9ff00] transition-colors rounded-none outline-none text-white w-64 hidden" oninput="debounceSearchOrder()">
                    </div>
                </div>
                <div id="ordersTable"></div>
            </div>

            <!-- DELIVERY VIEW -->
            <div id="view-delivery" class="view">
                <h3 class="df text-xs tracking-widest font-bold mb-6">Delivery Hub</h3>
                <div id="deliveryContent"></div>
            </div>

        </div>

        <footer class="px-8 py-3 border-t-2 border-white/10 flex justify-between text-[9px] text-white/20 df shrink-0">
            <span>FOODOS © 2026 — DBS MINI PROJECT</span>
            <span id="footerUser"></span>
        </footer>
    </main>
</div>

<!-- MODAL -->
<div id="modalContainer" class="hidden"></div>
<!-- TOASTS -->
<div id="toastContainer"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentUser = null;
let currentView = 'dashboard';
let selectedRestaurantId = null;
let currentLoginRole = 'customer';
let showingArchiveRes = false;
let showingArchiveMenu = false;

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
async function api(url, opts = {}) {
    const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (!res.ok) {
        try { return await res.json(); } catch { return { error: `HTTP ${res.status}` }; }
    }
    return res.json();
}

function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast df tracking-widest ${type === 'success' ? 'bg-[#d9ff00] text-black' : 'bg-red-500 text-white'}`;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

function closeModal() {
    const c = document.getElementById('modalContainer');
    c.classList.add('hidden');
    c.innerHTML = '';
}

function openModal(html) {
    const c = document.getElementById('modalContainer');
    c.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="bg-[#0d0d0d] bb p-8 w-[480px] max-h-[85vh] overflow-y-auto relative"><button onclick="closeModal()" class="absolute top-4 right-4 text-white/30 hover:text-white"><iconify-icon icon="lucide:x"></iconify-icon></button>${html}</div></div>`;
    c.classList.remove('hidden');
}

function fmt(n) { return '₹' + Number(n || 0).toLocaleString('en-IN'); }

// ═══════════════════════════════════════
// STATUS BADGE
// ═══════════════════════════════════════
const STATUS_LABELS = {
    PENDING:          { cls: 'bg-yellow-500/20 text-yellow-400', label: 'Pending' },
    ORDER_RECEIVED:   { cls: 'bg-orange-500/20 text-orange-400', label: 'Order Received' },
    CONFIRMED:        { cls: 'bg-blue-500/20 text-blue-400',     label: 'Confirmed' },
    OUT_FOR_DELIVERY: { cls: 'bg-purple-500/20 text-purple-400', label: 'Out for Delivery' },
    DELIVERED:        { cls: 'bg-green-500/20 text-green-400',   label: 'Delivered' },
    CANCELLED:        { cls: 'bg-red-500/20 text-red-400',       label: 'Cancelled' },
    ASSIGNED:         { cls: 'bg-blue-500/20 text-blue-400',     label: 'Assigned' },
};
function statusBadge(s) {
    const { cls, label } = STATUS_LABELS[s] || { cls: 'bg-white/10 text-white/40', label: s };
    return `<span class="px-2 py-0.5 ${cls} text-[9px] font-bold df">${label}</span>`;
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
function setLoginRole(role, btn) {
    currentLoginRole = role;
    document.querySelectorAll('.login-tab').forEach(b => b.classList.remove('active', 'text-[#d9ff00]'));
    btn.classList.add('active');
    const isAdmin = role === 'admin';
    document.getElementById('emailLabel').textContent = isAdmin ? 'Username' : 'Email';
    document.getElementById('loginEmail').placeholder = isAdmin ? 'admin' : 'email@example.com';
    document.getElementById('loginHint').textContent = isAdmin ? 'Use your admin username and password' : 'Login with your email and password';
    document.getElementById('registerLink').classList.toggle('hidden', isAdmin);
}

function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
}
function showLoginForm() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
}

async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return toast('Fill in all fields', 'error');
    const data = await api('/api/login', { method: 'POST', body: { email, password, role: currentLoginRole } });
    if (data.ok) { currentUser = data.user; enterDashboard(); }
    else toast(data.error || 'Invalid credentials', 'error');
}

async function doRegister() {
    const b = {
        name: document.getElementById('regName').value.trim(),
        email: document.getElementById('regEmail').value.trim(),
        password: document.getElementById('regPassword').value,
        phone: document.getElementById('regPhone').value.trim(),
        address: document.getElementById('regAddress').value.trim()
    };
    if (Object.values(b).some(v => !v)) return toast('Fill all fields', 'error');
    const d = await api('/api/register', { method: 'POST', body: b });
    if (d.ok) { toast('Account created! Please login.'); showLoginForm(); }
    else toast(d.error || 'Registration failed', 'error');
}

async function doLogout() {
    await api('/api/logout', { method: 'POST' });
    currentUser = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
}

// ═══════════════════════════════════════
// DASHBOARD INIT
// ═══════════════════════════════════════
function enterDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    const name = currentUser.NAME || currentUser.USERNAME || 'Admin';
    document.getElementById('userName').textContent = name;
    document.getElementById('userRole').textContent = currentUser.role === 'admin' ? 'Administrator' : 'Customer';
    document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('footerUser').textContent = `Logged in as ${name}`;
    buildSidebar();
    navigate('dashboard');
}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
function buildSidebar() {
    const isAdmin = currentUser.role === 'admin';
    const links = [
        { id: 'dashboard',   icon: 'lucide:layout-dashboard', label: 'Dashboard' },
        { id: 'restaurants', icon: 'lucide:utensils',          label: 'Restaurants' },
    ];
    if (!isAdmin) links.push({ id: 'cart', icon: 'lucide:shopping-cart', label: 'My Cart' });
    links.push({ id: 'orders', icon: 'lucide:clipboard-list', label: isAdmin ? 'All Orders' : 'My Orders' });
    if (isAdmin) links.push({ id: 'delivery', icon: 'lucide:truck', label: 'Deliveries' });

    document.getElementById('sidebarNav').innerHTML = links.map(l => `
        <a class="nav-link flex items-center gap-3 px-3 py-3 rounded-none" onclick="navigate('${l.id}')">
            <iconify-icon icon="${l.icon}" class="text-xl shrink-0"></iconify-icon>
            <span class="df text-[9px] tracking-widest font-bold">${l.label}</span>
        </a>
    `).join('');
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function navigate(view) {
    currentView = view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view)?.classList.add('active');

    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.querySelector(`.nav-link[onclick*="'${view}'"]`)?.classList.add('active');

    const titles = { dashboard:'Dashboard Overview', restaurants:'Restaurant Directory', menu:'Menu', cart:'Shopping Cart', orders:'Orders', delivery:'Delivery Hub' };
    document.getElementById('pageTitle').textContent = titles[view] || 'Dashboard';

    const isAdmin = currentUser.role === 'admin';
    document.getElementById('btnAddRestaurant')?.classList.toggle('hidden', !isAdmin);
    document.getElementById('btnAddMenuItem')?.classList.toggle('hidden', !isAdmin);
    document.getElementById('btnToggleArchiveRes')?.classList.toggle('hidden', !isAdmin);
    document.getElementById('btnToggleMenuArchive')?.classList.toggle('hidden', !isAdmin);

    if (view === 'dashboard')   loadDashboard();
    else if (view === 'restaurants') loadRestaurants();
    else if (view === 'cart')   loadCart();
    else if (view === 'orders') loadOrders();
    else if (view === 'delivery') loadDeliveries();
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
async function loadDashboard() {
    const stats = await api('/api/stats');
    const isAdmin = currentUser.role === 'admin';
    const metrics = isAdmin ? [
        { label: 'Total Revenue',    value: fmt(stats.total_revenue),   icon: 'lucide:trending-up',    color: 'text-[#d9ff00]' },
        { label: 'Total Orders',     value: stats.total_orders,         icon: 'lucide:clipboard-list', color: 'text-blue-400' },
        { label: 'Customers',        value: stats.total_customers,      icon: 'lucide:users',          color: 'text-purple-400' },
        { label: 'Pending / New',    value: stats.pending_orders,       icon: 'lucide:clock',          color: 'text-yellow-400' },
    ] : [
        { label: 'My Total Spend',   value: fmt(stats.total_revenue),   icon: 'lucide:wallet',         color: 'text-[#d9ff00]' },
        { label: 'Orders Placed',    value: stats.total_orders,         icon: 'lucide:clipboard-list', color: 'text-blue-400' },
        { label: 'Active Orders',    value: stats.total_customers,      icon: 'lucide:loader',         color: 'text-purple-400' },
        { label: 'Items in Cart',    value: stats.pending_orders,       icon: 'lucide:shopping-cart',  color: 'text-yellow-400' },
    ];

    document.getElementById('statsGrid').innerHTML = metrics.map(m => `
        <div class="bg-white/5 p-5 bb relative group overflow-hidden metric-card transition-all cursor-default">
            <div class="absolute -right-3 -bottom-3 opacity-5 group-hover:opacity-10 transition-opacity">
                <iconify-icon icon="${m.icon}" class="text-7xl ${m.color}"></iconify-icon>
            </div>
            <p class="df text-[9px] tracking-widest text-white/40 mb-2">${m.label}</p>
            <h3 class="text-3xl font-black tabular-nums leading-none">${m.value}</h3>
        </div>
    `).join('');

    // Recent orders - with clickable rows
    const orders = await api('/api/orders');
    const recent = (orders || []).slice(0, 6);
    document.getElementById('dashRecentOrders').innerHTML = recent.length ? `
        <table class="text-left text-xs">
            <thead><tr class="text-white/30 df tracking-widest text-[9px]">
                <th class="px-5 py-3">ID</th>
                <th class="px-5 py-3">${isAdmin ? 'Customer' : 'Restaurant'}</th>
                <th class="px-5 py-3">Amount</th>
                <th class="px-5 py-3">Status</th>
                <th class="px-5 py-3">Date</th>
            </tr></thead>
            <tbody class="divide-y divide-white/5">${recent.map(o => `
                <tr class="order-row transition-colors" onclick="showOrderModal(${o.ORDER_ID})">
                    <td class="px-5 py-3 font-bold text-[#d9ff00]">#${o.ORDER_ID}</td>
                    <td class="px-5 py-3">${o.CUSTOMER_NAME || o.RESTAURANT_NAME || '—'}</td>
                    <td class="px-5 py-3 font-bold">${fmt(o.TOTAL_AMOUNT)}</td>

async function submitAddMenuItem() {

async function removeFromCart(itemId) {
    await api(`/api/cart/${itemId}`, { method: 'DELETE' });
    loadCart();
}

async function clearCart() {
    if (!confirm('Clear your entire cart?')) return;
    await api('/api/cart/clear', { method: 'DELETE' });
    toast('Cart cleared'); loadCart();
}

async function placeOrder(rid) {
    const d = await api('/api/orders', { method: 'POST', body: { restaurant_id: rid } });
    if (d.ok) {
        toast(`Order #${d.order_id} placed! Choose payment method.`);
        showPaymentModal(d.order_id);
    } else toast(d.error || 'Order failed', 'error');
}

function showPaymentModal(orderId) {
    openModal(`
        <h3 class="df text-xs font-bold tracking-widest mb-2">Payment</h3>
        <p class="text-white/40 text-xs mb-6">Order #${orderId}</p>
        <label class="text-[9px] df tracking-widest text-white/50 block mb-1">Payment Method</label>
        <select id="payMethod" class="w-full bg-white/5 border-2 border-white/10 px-4 py-3 text-sm mb-6 focus:border-[#d9ff00] transition-colors text-white">
            <option value="UPI">UPI</option>
            <option value="CREDIT_CARD">Credit / Debit Card</option>
            <option value="CASH">Cash on Delivery</option>
        </select>
        <div id="payInfo" class="text-[10px] text-white/40 mb-4 hidden">You will pay when your order arrives. Your order will be marked as "Order Received".</div>
        <button onclick="submitPayment(${orderId})" class="w-full btn-accent df text-[9px] tracking-widest py-3 sa">Confirm</button>
    `);
    document.getElementById('payMethod').addEventListener('change', function() {
        document.getElementById('payInfo').classList.toggle('hidden', this.value !== 'CASH');
    });
}

async function submitPayment(orderId) {
    const method = document.getElementById('payMethod').value;
    const d = await api('/api/payments', { method: 'POST', body: { order_id: orderId, method } });
    if (d.ok) {
        closeModal();
        toast(method === 'CASH' ? 'Order received! Pay on delivery.' : 'Payment confirmed!');
        navigate('orders');
    } else toast(d.error || 'Payment failed', 'error');
}

async function loadOrders() {

    const q = document.getElementById('searchOrder')?.value.trim() || '';
    const url = q ? `/api/orders?q=${encodeURIComponent(q)}` : '/api/orders';
    const rows = await api(url);

        if (isAdmin) searchBar.classList.remove('hidden');
        else searchBar.classList.add('hidden');
    }
    document.getElementById('ordersTable').innerHTML = (rows && rows.length) ? `
        <div class="bg-white/5 bb overflow-hidden">
            <table class="text-left text-xs">
                <thead><tr class="text-white/30 df tracking-widest text-[9px] border-b border-white/10">
                    <th class="px-5 py-3">Order ID</th>

                        ${isAdmin ? `<td class="px-5 py-3">${o.CUSTOMER_NAME}</td>` : ''}
                        <td class="px-5 py-3">${o.RESTAURANT_NAME}</td>
                        <td class="px-5 py-3 font-bold">${fmt(o.TOTAL_AMOUNT)}</td>
                        <td class="px-5 py-3">${statusBadge(o.ORDER_STATUS)}</td>
                        <td class="px-5 py-3 text-white/30 text-[10px]">${o.ORDER_TIME}</td>
                        <td class="px-5 py-3"><button onclick="showOrderModal(${o.ORDER_ID})" class="text-[9px] df tracking-widest text-white/40 hover:text-[#d9ff00] border border-white/10 hover:border-[#d9ff00] px-3 py-1 transition-all">View</button></td>

                    </tr>
                `).join('')}</tbody>
            </table>
        </div>
    ` : '<p class="text-white/30 text-sm py-8">No orders found.</p>';
}

async function updateOrderStatus(oid, status) {
    const d = await api(`/api/orders/${oid}/status`, { method: 'PUT', body: { status } });

    if (d.ok) { toast('Delivery agent assigned!'); loadOrders(); } else toast(d.error || 'No agents available', 'error');

            </div>
            <div class="bg-white/5 bb p-5">
                <h4 class="df text-[10px] tracking-widest font-bold mb-4">Agent Roster</h4>
                <div class="space-y-2">${(agents||[]).map(a => `
                    <div class="flex items-center justify-between p-3 bg-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full ${a.IS_AVAILABLE==='Y'?'bg-green-500/20 text-green-400':'bg-red-500/20 text-red-400'} flex items-center justify-center text-[10px] font-bold">${a.AGENT_NAME.charAt(0)}</div>
                            <div>
                                <p class="text-sm font-semibold">${a.AGENT_NAME}</p>
                                <p class="text-[9px] text-white/30">${a.PHONE}</p>
                            </div>
                        </div>
                        <span class="text-[9px] df tracking-widest ${a.IS_AVAILABLE==='Y'?'text-green-400':'text-red-400'}">${a.IS_AVAILABLE==='Y'?'● Available':'● On Delivery'}</span>
                    </div>
                `).join('')}</div>
            </div>
        </div>
    `;
}

async function updateDelivery(did, status) {
    const d = await api(`/api/deliveries/${did}/status`, { method: 'PUT', body: { status } });
    if (d.ok) { toast('Status updated!'); loadDeliveries(); } else toast(d.error, 'error');
}

// INIT
(async () => {
    const s = await api('/api/session');
    if (s.ok && s.user) { currentUser = s.user; enterDashboard(); }
})();
</script>
